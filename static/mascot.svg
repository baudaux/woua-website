<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 240" width="220" height="240" aria-label="Woua mascot">

  <!-- TAIL (behind body) -->
  <path d="M 155 195 Q 205 165 195 120" stroke="#b04818" stroke-width="14" fill="none" stroke-linecap="round"/>

  <!-- BODY -->
  <ellipse cx="100" cy="188" rx="52" ry="42" fill="#f06828"/>
  <!-- CHEST -->
  <ellipse cx="100" cy="172" rx="28" ry="20" fill="#f09050"/>

  <!-- HEAD -->
  <circle cx="100" cy="110" r="44" fill="#f06828"/>

  <!-- LEFT EAR: long droopy Cocker ear, in front of head -->
  <path d="M 62 90 C 40 96 26 125 28 162 C 30 188 46 200 62 194 C 70 180 72 148 72 100 Z" fill="#b04818"/>
  <!-- RIGHT EAR -->
  <path d="M 138 90 C 160 96 174 125 172 162 C 170 188 154 200 138 194 C 130 180 128 148 128 100 Z" fill="#b04818"/>

  <!-- SNOUT -->
  <ellipse cx="100" cy="126" rx="22" ry="14" fill="#ffd6b0"/>

  <!-- NOSE -->
  <ellipse cx="100" cy="118" rx="10" ry="7" fill="#222"/>
  <ellipse cx="97" cy="116" rx="3" ry="2" fill="#fff" opacity="0.4"/>

  <!-- LEFT EYE -->
  <circle cx="82" cy="104" r="10" fill="#fff"/>
  <circle cx="83" cy="105" r="6.5" fill="#5c1a00"/>
  <circle cx="84" cy="106" r="3" fill="#111"/>
  <circle cx="81" cy="103" r="2" fill="#fff"/>

  <!-- RIGHT EYE -->
  <circle cx="118" cy="104" r="10" fill="#fff"/>
  <circle cx="119" cy="105" r="6.5" fill="#5c1a00"/>
  <circle cx="120" cy="106" r="3" fill="#111"/>
  <circle cx="117" cy="103" r="2" fill="#fff"/>

  <!-- MOUTH -->
  <path d="M 91 133 Q 100 141 109 133" stroke="#b04818" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- TONGUE -->
  <ellipse cx="100" cy="140" rx="7" ry="6" fill="#e05a7a"/>

  <!-- FRONT LEFT LEG -->
  <rect x="74" y="216" width="20" height="20" rx="10" fill="#f06828"/>
  <!-- FRONT RIGHT LEG -->
  <rect x="106" y="216" width="20" height="20" rx="10" fill="#f06828"/>

  <!-- SHADOW -->
  <ellipse cx="100" cy="236" rx="50" ry="5" fill="#0002"/>
</svg>
